<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- v13 -->
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TK 爆品生命周期看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--surf2:#f0efe9;--surf3:#e8e7e0;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --tx:#1a1918;--tx2:#6b6960;--tx3:#9c9b93;
  --g:#1a7a4a;--gbg:#e8f5ee;--gm:#3faa6e;
  --a:#8a5500;--abg:#fdf0d5;--am:#e09820;
  --r:#a82020;--rbg:#fdeaea;--rm:#d45050;
  --b:#1a508a;--bbg:#e6f0f8;--bm:#4a88c4;
  --rad:8px;--radl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161614;--surf:#1e1e1b;--surf2:#252521;--surf3:#2d2d29;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --tx:#e5e3da;--tx2:#9c9a92;--tx3:#6b6960;
  --g:#3faa6e;--gbg:rgba(63,170,110,.13);--gm:#3faa6e;
  --a:#e09820;--abg:rgba(224,152,32,.13);--am:#e09820;
  --r:#d45050;--rbg:rgba(212,80,80,.13);--rm:#d45050;
  --b:#4a88c4;--bbg:rgba(74,136,196,.13);--bm:#4a88c4;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;color:var(--tx);background:var(--bg);min-height:100vh}
.app{padding:16px;max-width:100%;margin:0 auto}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar h1 em{color:var(--tx3);font-style:normal;font-weight:400}
.ctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{border:0.5px solid var(--bd2);border-radius:var(--rad);padding:5px 12px;cursor:pointer;font-size:11px;font-weight:500;color:var(--tx);background:var(--surf);white-space:nowrap}
.btn:hover{background:var(--surf2)}
.btn.pri{background:var(--tx);color:var(--surf);border-color:var(--tx)}
.btn.pri:hover{opacity:.85}

/* ── NAV BAR ── */
.navbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:8px 12px;background:var(--surf);border:0.5px solid var(--bd);border-radius:var(--radl);flex-wrap:wrap}
.wknav{display:flex;align-items:center;gap:4px}
.wknav button{background:var(--surf2);border:0.5px solid var(--bd2);border-radius:var(--rad);padding:3px 10px;cursor:pointer;font-size:11px;color:var(--tx2)}
.wknav button:hover{background:var(--surf3)}
.wknav .lbl{font-size:12px;font-weight:600;min-width:88px;text-align:center}
.view-seg{display:flex;background:var(--surf2);border-radius:var(--rad);padding:2px;gap:2px}
.view-seg button{background:none;border:none;border-radius:6px;padding:3px 12px;font-size:11px;font-weight:500;cursor:pointer;color:var(--tx2)}
.view-seg button.on{background:var(--surf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cmp-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);margin-left:auto;cursor:pointer;user-select:none}
.cmp-toggle input{accent-color:var(--tx)}
.period-sub{font-size:11px;color:var(--tx3)}

/* ── SUMMARY TABLE ── */
.sw{margin-bottom:14px;border:0.5px solid var(--bd);border-radius:var(--radl);overflow:hidden;background:var(--surf)}
.st{width:100%;border-collapse:collapse}
.st th,.st td{border:0.5px solid var(--bd);padding:5px 10px;font-size:11px;text-align:center}
.st td:first-child{text-align:left;color:var(--tx2);background:var(--surf2);white-space:nowrap}
.st th:first-child{background:var(--surf2)}
.th-t{background:#eae9e2;color:#3a3a38;font-weight:600}
.th-n{background:#d6e8ff;color:#1a3a8a;font-weight:600}
.th-b{background:#fdeacc;color:#7a3e00;font-weight:600}
.th-s{background:#d6f0e2;color:#1a4a2a;font-weight:600}
.th-d{background:#fddce8;color:#7a0a3a;font-weight:600}
.sok{color:var(--g);font-weight:600}.sng{color:var(--r);font-weight:600}

/* ═══════════════════════════════════════
   HORIZONTAL STAGE BLOCKS
   Each stage = one block, stacked vertically.
   Inside each block: products are COLUMNS.
   Fields are ROWS on the left label column.
═══════════════════════════════════════ */
.stages{display:flex;flex-direction:column;gap:10px}

.stage-block{border:0.5px solid var(--bd);border-radius:var(--radl);overflow:hidden;background:var(--surf)}

/* Stage header — clickable toggle */
.stage-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s}
.stage-hdr:hover{filter:brightness(.97)}
.sh-title{font-size:13px;font-weight:600}
.sh-count{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:600}
.sh-summary{font-size:11px;color:var(--tx2);margin-left:4px;display:flex;gap:14px}
.sh-summary b{color:var(--tx);font-weight:600}
.sh-arrow{margin-left:auto;font-size:11px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.stage-hdr.open .sh-arrow{transform:rotate(180deg)}

/* stage theme colors */
.sh-t{background:#eae9e2}.sh-t .sh-title{color:#333}.sh-t .sh-count{background:rgba(0,0,0,.1);color:#333}
.sh-n{background:#d6e8ff}.sh-n .sh-title{color:#1a3a8a}.sh-n .sh-count{background:rgba(26,58,138,.15);color:#1a3a8a}
.sh-b{background:#fdeacc}.sh-b .sh-title{color:#7a3e00}.sh-b .sh-count{background:rgba(122,62,0,.15);color:#7a3e00}
.sh-s{background:#d6f0e2}.sh-s .sh-title{color:#1a4a2a}.sh-s .sh-count{background:rgba(26,74,42,.15);color:#1a4a2a}
.sh-d{background:#fddce8}.sh-d .sh-title{color:#7a0a3a}.sh-d .sh-count{background:rgba(122,10,58,.15);color:#7a0a3a}

/* stage body: collapses */
.stage-body{overflow:hidden;transition:max-height .28s ease}
.stage-body.closed{max-height:0!important}

/* ── HORIZONTAL PRODUCT TABLE ── */
/* The core layout: a table where
   - Col 0 = field label (sticky left)
   - Col 1..N = one product each
   This allows horizontal scrolling when many products */
.product-table-wrap{overflow-x:auto;border-top:0.5px solid var(--bd)}
.product-table{border-collapse:collapse;min-width:100%;table-layout:fixed}

/* Field label column (sticky) */
.product-table .col-label{
  width:130px;min-width:130px;max-width:130px;
  position:sticky;left:0;z-index:2;
  background:var(--surf2);
}
/* Product columns — fixed width so they're uniform */
.product-table .col-prod{
  width:180px;min-width:160px;
}

/* Product header row */
.prod-hdr-cell{
  padding:8px 10px;background:var(--surf2);border-bottom:0.5px solid var(--bd);
  border-right:0.5px solid var(--bd);vertical-align:top;position:sticky;top:0;z-index:1;
}
.prod-hdr-cell.sticky-corner{
  position:sticky;left:0;z-index:3;background:var(--surf2);
}
.prod-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.prod-spu{font-size:10px;color:var(--tx3)}
.prod-edit-btn{font-size:9px;color:var(--tx3);border:0.5px solid var(--bd);border-radius:3px;padding:1px 4px;cursor:pointer;margin-left:4px;opacity:0;transition:opacity .15s}
.prod-hdr-cell:hover .prod-edit-btn{opacity:1}

/* Progress bar inside header */
.prod-prog{margin-top:5px}
.prod-prog-row{display:flex;justify-content:space-between;font-size:9px;color:var(--tx2);margin-bottom:2px}
.prod-prog-pct{font-weight:600}.ok{color:var(--g)}.lo{color:var(--r)}
.prod-prog-bg{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prod-prog-fill{height:100%;border-radius:2px}
.c-ok{background:var(--gm)}.c-mid{background:var(--am)}.c-lo{background:var(--rm)}

/* Section header row (spans all columns) */
.section-row td{
  font-size:9px;font-weight:600;color:var(--tx3);
  padding:3px 10px;letter-spacing:.5px;text-transform:uppercase;
  background:var(--surf2);border-bottom:0.5px solid var(--bd);
  border-right:0.5px solid var(--bd);
}
.section-row td.sec-label{
  position:sticky;left:0;z-index:2;background:var(--surf2);
}

/* Data rows */
.product-table tr.data-row td{
  padding:4px 10px;border-bottom:0.5px solid var(--bd);border-right:0.5px solid var(--bd);
  font-size:10px;vertical-align:middle;
}
.product-table tr.data-row:last-child td{border-bottom:none}
.product-table tr.data-row td.field-label{
  color:var(--tx3);position:sticky;left:0;z-index:2;
  background:var(--surf2);white-space:nowrap;font-size:10px;
}
.product-table tr.data-row td.field-val{
  font-weight:600;text-align:right;white-space:nowrap;color:var(--tx);
}
/* alert coloring on value cells */
.product-table tr.data-row td.field-val.al{color:var(--r)}
.product-table tr.data-row td.field-val.gd{color:var(--g)}
.product-table tr.data-row td.cmp-cell{
  font-size:9px;color:var(--tx3);text-align:right;padding-left:0;white-space:nowrap;padding-right:10px;
}
.cu{color:var(--g)}.cd{color:var(--r)}.cf{color:var(--tx3)}
.ev{color:var(--tx3)}
/* top-border accent on product column based on perf */
.prod-al{border-top:3px solid var(--rm)!important}
.prod-wn{border-top:3px solid var(--am)!important}
.prod-gd{border-top:3px solid var(--gm)!important}
.prod-no{border-top:3px solid transparent}

/* Hint row */
.hint-row td{font-size:10px;padding:3px 10px;background:var(--abg);color:var(--a);border-right:0.5px solid var(--bd);border-bottom:0.5px solid var(--bd)}
.hint-row td.hl{position:sticky;left:0;z-index:2;background:var(--abg)}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:var(--surf);border:0.5px solid var(--bd2);border-radius:14px;padding:20px;width:min(96vw,960px);max-height:92vh;overflow-y:auto}
.mbox h2{font-size:15px;font-weight:600;margin-bottom:4px}
.msub{font-size:11px;color:var(--tx2);margin-bottom:14px;line-height:1.6}
.msec{font-size:11px;font-weight:600;color:var(--tx2);margin:14px 0 6px;padding-bottom:3px;border-bottom:0.5px solid var(--bd)}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.fl{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.mbox input,.mbox select,.mbox textarea{width:100%;border:0.5px solid var(--bd2);border-radius:var(--rad);padding:5px 9px;font-size:12px;background:var(--surf);color:var(--tx)}
.mbox input:focus,.mbox select:focus{outline:none;border-color:var(--bm)}
.mbox textarea{min-height:52px;resize:vertical}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.mfoot button{border:0.5px solid var(--bd2);border-radius:var(--rad);padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;background:none;color:var(--tx)}
.mfoot button:hover{background:var(--surf2)}
.mfoot .mp{background:var(--tx);color:var(--surf);border-color:var(--tx)}
.mfoot .mp:hover{opacity:.88}
.mfoot .md{color:var(--r)}

/* upload */
.usteps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.ustep{flex:1;border:0.5px solid var(--bd);border-radius:var(--radl);overflow:hidden}
.ush{padding:8px 12px;display:flex;align-items:center;gap:7px;border-bottom:0.5px solid var(--bd);background:var(--surf2);font-size:11px;font-weight:600}
.ush .n{width:18px;height:18px;border-radius:50%;background:var(--tx);color:var(--surf);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ush .tag{font-size:10px;color:var(--tx3);font-weight:400;margin-left:auto}
.usb{padding:10px 12px}
.usb .desc{font-size:10px;color:var(--tx2);margin-bottom:5px;line-height:1.5}
.usb .flds{font-size:10px;color:var(--tx3);line-height:1.6}
.usb .flds b{color:var(--tx2);font-weight:600}
.dz{border:1.5px dashed var(--bd2);border-radius:var(--rad);padding:12px 8px;text-align:center;cursor:pointer;margin-top:7px;transition:all .15s}
.dz:hover,.dz.drag{border-color:var(--bm);background:var(--bbg)}
.dz input{display:none}
.dz-ic{font-size:20px;margin-bottom:3px}
.dz-tx{font-size:11px;color:var(--tx2)}
.dz.done{border-color:var(--gm);background:var(--gbg)}
.dz.done .dz-tx{color:var(--g)}
.pstat{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:var(--rad);background:var(--surf2);color:var(--tx2)}
.pstat.ok{background:var(--gbg);color:var(--g)}
.pstat.er{background:var(--rbg);color:var(--r)}
.pvw{margin-top:10px;overflow-x:auto;max-height:260px;overflow-y:auto;border:0.5px solid var(--bd);border-radius:var(--rad);background:var(--surf)}
.ptbl{width:100%;border-collapse:collapse;font-size:11px}
.ptbl th{position:sticky;top:0;background:var(--surf2);padding:4px 10px;text-align:left;border-bottom:0.5px solid var(--bd2);white-space:nowrap;font-weight:600;color:var(--tx);font-size:11px}
.ptbl td{padding:4px 10px;border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--surf)}
.tnew{font-size:10px;background:var(--gbg);color:var(--g);border-radius:3px;padding:0 4px;font-weight:600}
.tupd{font-size:10px;background:var(--abg);color:var(--a);border-radius:3px;padding:0 4px;font-weight:600}
.itbl{width:100%;border-collapse:collapse;font-size:11px}
.itbl th{text-align:left;padding:3px 6px;color:var(--tx2);border-bottom:0.5px solid var(--bd);white-space:nowrap;font-weight:500}
.itbl td{padding:2px 4px;border-bottom:0.5px solid var(--bd);vertical-align:top}
.itbl input,.itbl select{width:100%;border:0.5px solid var(--bd2);border-radius:4px;padding:2px 5px;font-size:11px;background:var(--surf);color:var(--tx)}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0;display:inline-block}
.sync-dot.ok{background:var(--gm)}
.sync-dot.saving{background:var(--am);animation:pulse .8s ease-in-out infinite}
.sync-dot.err{background:var(--rm)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

</style>
</head>
<body>

<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div style="background:var(--surf);border:0.5px solid var(--bd2);border-radius:16px;padding:36px;width:320px;text-align:center">
    <div style="font-size:28px;margin-bottom:12px">📊</div>
    <h2 style="font-size:17px;font-weight:600;margin-bottom:6px">TK 爆品看板</h2>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:22px">请输入团队密码</p>
    <input type="password" id="pw-input" placeholder="访问密码"
      style="width:100%;border:0.5px solid var(--bd2);border-radius:8px;padding:10px 14px;font-size:14px;background:var(--surf);color:var(--tx);margin-bottom:10px;text-align:center;letter-spacing:2px"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()"
      style="width:100%;background:var(--tx);color:var(--surf);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer">进入看板</button>
    <div id="login-err" style="font-size:12px;color:var(--r);margin-top:8px"></div>
  </div>
</div>

<div id="main-app" style="display:none">

<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surf);border-bottom:0.5px solid var(--bd);font-size:11px;color:var(--tx2)">
  <span id="sync-dot" class="sync-dot"></span>
  <span id="sync-label">正在连接…</span>
  <button onclick="loadCloud()" style="background:none;border:0.5px solid var(--bd2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;color:var(--tx2);margin-left:4px">↻ 刷新</button>
  <span id="sync-time" style="margin-left:auto;color:var(--tx3)"></span>
</div>

<div class="app">
  <div class="topbar">
    <h1>TK 爆品生命周期看板 <em>· Indonesia</em></h1>
    <div class="ctrls">
      <button class="btn pri" onclick="openUpload()">⬆ 上传表格</button>
      <button class="btn" onclick="openManual()">✎ 手动录入</button>
      <button class="btn" onclick="openAdd()">＋ 新增产品</button>
      <button class="btn" onclick="openManageProducts()" style="color:var(--r)">🗑 管理产品</button>
    </div>
  </div>

  <div class="navbar">
    <div class="wknav">
      <button onclick="navPrev()">◀</button>
      <span class="lbl" id="period-lbl">—</span>
      <button onclick="navNext()">▶</button>
    </div>
    <div class="view-seg">
      <button id="vsw" class="on" onclick="setView('week')">周</button>
      <button id="vsm" onclick="setView('month')">月</button>
    </div>
    <span class="period-sub" id="period-sub"></span>
    <label class="cmp-toggle">
      <input type="checkbox" id="cmp-chk" checked onchange="renderAll()">
      显示对比
    </label>
  </div>

  <!-- summary table -->
  <div class="sw"><table class="st">
    <thead><tr>
      <th style="background:var(--surf2);text-align:left;min-width:100px" id="st-period">—</th>
      <th class="th-t">测品期</th><th class="th-n">新品孵化</th>
      <th class="th-b">爆发期</th><th class="th-s">维稳期</th><th class="th-d">衰退期</th>
    </tr></thead>
    <tbody id="stb"></tbody>
  </table></div>

  <div class="stages" id="stages"></div>
</div>
<div id="modal"></div>

<script>
const STAGES=[
  {key:'test',   label:'测品期',  sh:'sh-t'},
  {key:'new',    label:'新品孵化',sh:'sh-n'},
  {key:'blast',  label:'爆发期',  sh:'sh-b'},
  {key:'stable', label:'维稳期',  sh:'sh-s'},
  {key:'decline',label:'衰退期',  sh:'sh-d'},
];

const stageOpen={test:false,new:true,blast:true,stable:true,decline:true};

// Fields — auto:true = computed; cmp:true = show comparison
const FIELDS={
  // 测品期: TK CTR, TK CVR, SP CTR, SP CVR, 完播率, 直播停留
  test:[
    {k:'tkCtr',         l:'TK CTR',          type:'pct', cmp:true, sec:'商品卡数据'},
    {k:'tkCvr',         l:'TK CVR',          type:'pct', cmp:true},
    {k:'spCtr',         l:'SP CTR',          type:'pct', cmp:true},
    {k:'spCvr',         l:'SP CVR',          type:'pct', cmp:true},
    {k:'vidFinishRate', l:'完播率',            type:'pct', cmp:true, sec:'内容'},
    {k:'liveStay',      l:'直播停留(s)',       type:'num', cmp:true, sec:'直播'},
  ],
  // 新品孵化: 总销量/GMV/TK/SP销量, 促销活动, TK impression/CVR, SP impression/CVR,
  //           brief类型/数量, video impression, 达人销量/creator/videos/新合作,
  //           直播impression, TK ROI, 有效素材数, SP ROI
  new:[
    {k:'totalOrders',   l:'总销量',            type:'num', cmp:true, auto:true, sec:'销售数据'},
    {k:'totalGmv',      l:'总GMV',             type:'gmv', cmp:true, auto:true},
    {k:'tkOrders',      l:'TK销量',            type:'num', cmp:true},
    {k:'spOrders',      l:'SP销量',            type:'num', cmp:true},
    {k:'promoNote',     l:'促销活动',           type:'text'},
    {k:'tkImp',         l:'TK impression',    type:'num', cmp:true, sec:'商品卡数据'},
    {k:'tkCvr',         l:'TK CVR',           type:'pct', cmp:true},
    {k:'spImp',         l:'SP impression',    type:'num', cmp:true},
    {k:'spCvr',         l:'SP CVR',           type:'pct', cmp:true},
    {k:'briefType',     l:'brief类型',         type:'text', sec:'内容'},
    {k:'briefCount',    l:'brief数量',         type:'num'},
    {k:'vidImp',        l:'video impression', type:'num', cmp:true},
    {k:'kolOrders',     l:'达人销量',           type:'num', cmp:true, sec:'达人'},
    {k:'kolCreators',   l:'sales creator',   type:'num', cmp:true},
    {k:'kolVideos',     l:'videos',           type:'num', cmp:true},

function cP(v){if(v==null||v===''||v==='--'||v==='-')return null;const s=String(v).replace('%','').replace(',','.').trim();const n=parseFloat(s);if(isNaN(n))return null;return n>1?n/100:n}
function cG(v){if(v==null||v===''||v==='--')return null;const s=String(v).replace(/Rp/gi,'').replace(/\s/g,'').replace(/\./g,'').replace(',','');const n=parseFloat(s);return isNaN(n)?null:n}

}
function parseTK(rows){
  // Find header row
  let hi=0;
  for(let i=0;i<Math.min(rows.length,5);i++){
    if(String(rows[i][0]||'').trim()==='ID'){hi=i;break;}
  }
  // Auto-detect week
  const ds=String(rows[0]&&rows[0][0]||'');
  const dm=ds.match(/(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
  let detectedWk=null;
  if(dm){
    const d=new Date(dm[2]);
    const y=d.getFullYear(),jan1=new Date(y,0,1);
    const w=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
    detectedWk=y+' W'+String(w).padStart(2,'0');
  }

  // Map exact column names (verified against real TK export)
  const h=rows[hi].map(c=>String(c||'').trim());
  const ci=name=>h.indexOf(name);
  const iId=0,iName=1;
  const iOrders=ci('Orders'),iItems=ci('Items sold'),iGmv=ci('GMV');
  const iShopImp=ci('Shop tab listing impressions');
  const iShopCtr=ci('Shop tab clickthrough rate');
  const iShopCvr=ci('Shop tab conversion rate');
  const iLiveImp=ci('LIVE impressions');
  const iLiveCtr=ci('LIVE click-through rate');
  const iLiveCvr=ci('LIVE conversion rate');
  const iVidImp=ci('Video impressions');
  const iVidCtr=ci('Video click-through rate');
  const iVidCvr=ci('Video conversion rate');

  // Number parsers for Indonesian format (dots=thousands, comma=decimal)
  function parseNum(v){
    if(v==null||v==='')return null;
    const s=String(v).replace(/Rp/gi,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
    const n=parseFloat(s);return isNaN(n)?null:n;
  }
  function parseGmv(v){
    if(v==null||v==='')return null;
    // Indonesian: "55.911.877" = 55911877 (dots are thousand separators)
    const s=String(v).replace(/Rp/gi,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
    const n=parseFloat(s);return isNaN(n)?null:n;
  }
  function parsePct(v){
    if(v==null||v==='')return null;
    const s=String(v).replace('%','').replace(',','.').trim();
    const n=parseFloat(s);if(isNaN(n))return null;
    // Values like "5.12" mean 5.12%, store as 0.0512
    return n>1?n/100:n;
  }

  const out={detectedWk:detectedWk};
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    const tkId=String(r[iId]||'').trim();
    if(!tkId||tkId==='ID')continue;
    const name=String(r[iName]||'');

    // SPU resolution: 1) built-in TK_ID_MAP, 2) SP- extraction (4+ digits only)
    let spu=TK_ID_MAP[tkId];
    if(!spu){
      const m=name.match(/SP-[A-Z]{0,3}(\d{4,})/i);
      if(m)spu=m[1];
    }
    if(!spu)continue; // skip unmapped products

    const isPrimary=(SPU_PRIMARY[spu]===tkId);

    if(!out[spu])out[spu]={spu:spu,tkId:tkId,name:name,
      tkOrders:0,tkGmv:0,tkImp:0,liveImp:0,vidImp:0};
    const d=out[spu];

    // Accumulate totals across all links
    d.tkOrders+=(parseNum(r[iOrders])||parseNum(r[iItems])||0);
    d.tkGmv   +=(parseGmv(r[iGmv])||0);
    d.tkImp   +=(parseNum(r[iShopImp])||0);
    d.liveImp +=(parseNum(r[iLiveImp])||0);
    d.vidImp  +=(parseNum(r[iVidImp])||0);

    // Rates: only from primary link (as marked yellow in SPU-SKU对应表)
    if(isPrimary){
      if(parsePct(r[iShopCtr])!=null)d.tkCtr=parsePct(r[iShopCtr]);
      if(parsePct(r[iShopCvr])!=null)d.tkCvr=parsePct(r[iShopCvr]);
      if(parsePct(r[iLiveCtr])!=null)d.liveCtr=parsePct(r[iLiveCtr]);
      if(parsePct(r[iLiveCvr])!=null)d.liveCvr=parsePct(r[iLiveCvr]);
      if(parsePct(r[iVidCtr])!=null)d.vidCtr=parsePct(r[iVidCtr]);
      if(parsePct(r[iVidCvr])!=null)d.vidCvr=parsePct(r[iVidCvr]);
    }
  }
  // Clean zeros to null
  Object.keys(out).filter(k=>k!=='detectedWk').forEach(k=>{
    const d=out[k];
    ['tkOrders','tkGmv','tkImp','liveImp','vidImp'].forEach(f=>{if(!d[f])d[f]=null;});
  });
  return out;
}
function parseSP(rows){
  // Header is row 0 (no date row in Shopee export)
  const h=rows[0].map(c=>String(c||'').trim());
  const ci=name=>h.indexOf(name);

  // Auto-detect date from filename not possible, use nav week
  // But check row 0 for date pattern just in case
  const ds=String(rows[0][0]||'');
  const dm=ds.match(/(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
  let detectedWk=null;
  if(dm){
    const d=new Date(dm[2]);const y=d.getFullYear(),jan1=new Date(y,0,1);
    const w=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
    detectedWk=y+' W'+String(w).padStart(2,'0');
  }

  const iName   = ci('Product');
  const iVarId  = ci('Variation ID');
  const iGmv    = ci('Sales (Confirmed Order) (IDR)');
  const iOrd    = ci('Confirmed Order');
  const iUnits  = ci('Units (Confirmed Order)');
  const iImp    = ci('Product Impression');
  const iCtr    = ci('CTR');
  const iCvr    = ci('Order Conversion Rate (Confirmed Order)');
  const iRepeat = ci('Repeat Order Rate (Confirmed Order)');

  function parseGmv(v){
    if(v==null||v==='')return null;
    // Indonesian format: dots=thousands e.g. "49.840.000" = 49840000
    const s=String(v).replace(/Rp/gi,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
    const n=parseFloat(s);return isNaN(n)?null:n;
  }
  function parseNum(v){
    if(v==null||v==='')return null;
    const s=String(v).replace(/,/g,'').trim();
    const n=parseFloat(s);return isNaN(n)?null:n;
  }
  function parsePct(v){
    if(v==null||v==='')return null;
    const s=String(v).replace('%','').replace(',','.').trim();
    const n=parseFloat(s);if(isNaN(n))return null;
    return n>1?n/100:n;
  }

  const out={detectedWk:detectedWk};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name=String(r[iName]||'');
    // Extract SPU: require 4+ digits to avoid matching short codes
    const m=name.match(/SP-[A-Z]{0,3}(\d{4,})/i);
    if(!m)continue;
    const spu=m[1];

    const varId=String(r[iVarId]||'').trim();
    const isSpuRow=(varId==='-'||varId==='');

    if(!out[spu])out[spu]={spu:spu,name:name,spGmv:0,spOrders:0};
    const d=out[spu];

    // Accumulate GMV and orders from ALL rows (SPU + SKU rows)
    d.spGmv   +=(parseGmv(r[iGmv])||0);
    d.spOrders+=(parseNum(r[iOrd])||parseNum(r[iUnits])||0);

    // Rates/impression only from SPU-level row (Variation ID = '-')
    if(isSpuRow){
      const imp=parseNum(r[iImp]);
      const ctr=parsePct(r[iCtr]);
      const cvr=parsePct(r[iCvr]);
      const rep=parsePct(r[iRepeat]);
      if(imp!=null)d.spImp=imp;
      if(ctr!=null)d.spCtr=ctr;
      if(cvr!=null)d.spCvr=cvr;
      if(rep!=null)d.repurchase=rep;
    }
  }
  // Clean zeros to null
  Object.keys(out).filter(k=>k!=='detectedWk').forEach(k=>{
    const d=out[k];
    ['spGmv','spOrders','spImp'].forEach(f=>{if(!d[f])d[f]=null;});
  });
  return out;
}
function parseKOL(rows){
  let hi=0;
  for(let i=0;i<Math.min(rows.length,5);i++){
    if(String(rows[i][0]||'').toLowerCase().includes('product id')){hi=i;break;}
  }
  const ds=String(rows[0]&&rows[0][0]||'');
  const dm=ds.match(/(\d{4}-\d{2}-\d{2})\s*~\s*(\d{4}-\d{2}-\d{2})/);
  let detectedWk=null;
  if(dm){const d=new Date(dm[2]);const y=d.getFullYear(),s=new Date(y,0,1);const w=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);detectedWk=y+' W'+String(w).padStart(2,'0');}
  const out={detectedWk:detectedWk};
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    const tkId=String(r[0]||'').trim();if(!tkId)continue;
    const name=String(r[1]||'');
    const spu=extractSpu(name);
    const key=spu||tkId;
    if(!out[key])out[key]={spu:spu,tkId:tkId,name:name,kolGmv:0,kolOrders:0,kolVideos:0,kolCreators:0};
    const d=out[key];
    d.kolGmv+=(cG(r[2])||0);d.kolOrders+=(cN(r[3])||0);
    d.kolCreators+=(cN(r[6])||0);d.kolVideos+=(cN(r[8])||0);
  }
  return out;
}

function parseCost(rows){
  const out={};
  // Find header row
  let hi=0;
  for(let i=0;i<Math.min(rows.length,3);i++){
    if(String(rows[i][0]||'').toLowerCase().includes('sku')){hi=i;break;}
  }
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    const sku=String(r[0]||'').trim();
    const cost=parseFloat(String(r[1]||'').replace(/,/g,''));
    if(!sku||isNaN(cost))continue;
    const m=sku.match(/SP-[A-Z]*(\d+)/i);
    if(!m)continue;
    const spu=m[1];
    if(!out[spu])out[spu]={costs:[],spu};
    out[spu].costs.push(cost);
  }
  // Average cost per SPU
  Object.keys(out).forEach(spu=>{
    const d=out[spu];
    d.avgCost=d.costs.reduce((a,b)=>a+b,0)/d.costs.length;
  });
  return out;
}
function fN(v){if(v==null)return null;if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(0)+'K';return String(Math.round(v))}
function fG(v){if(v==null)return null;if(v>=1e6)return'Rp '+(v/1e6).toFixed(1)+'M';if(v>=1000)return'Rp '+(v/1000).toFixed(0)+'K';return'Rp '+Math.round(v)}
function fP(v){if(v==null)return null;return(Math.round(v*1000)/10).toFixed(1)+'%'}
function fR(v){if(v==null)return null;return v.toFixed(2)}
function fmt(v,t){if(t==='pct')return fP(v);if(t==='gmv')return fG(v);if(t==='roi')return fR(v);return fN(v)}

function gwd(p,wk){return p.weeks.find(w=>w.week===wk)||null}

function gma(p,m){
  const wks=p.weeks.filter(w=>wk2m(w.week)===m);if(!wks.length)return null;

function gpma(p,m){return gma(p,prevMonth(m))}

function migrateHint(p,wk){
  const d=gwd(p,wk);const pw=gpwd(p,wk);if(!d)return null;
  const chg=pw?.totalOrders&&d.totalOrders?(d.totalOrders-pw.totalOrders)/pw.totalOrders:null;
  if(p.stage==='new'&&(d.totalOrders||0)>=200&&chg>=0.2)return'可晋升 → 爆发期';
  if(p.stage==='blast'&&chg!=null&&chg<=-0.15)return'注意 → 可能进入维稳';
  if(p.stage==='stable'&&chg!=null&&chg<=-0.20)return'注意 → 可能进入衰退';
  if(p.stage==='decline'&&chg!=null&&chg>=0.10)return'回升 → 复查阶段';
  return null;
}

// ── build horizontal stage table ──
function buildStageTable(st,wk){
  const ps=products.filter(p=>p.stage===st.key);
  if(!ps.length)return'<div style="padding:16px;color:var(--tx3);font-size:11px;text-align:center">该阶段暂无产品</div>';

  const showCmp=document.getElementById('cmp-chk').checked;
  const fields=FIELDS[st.key]||[];

  // gather cur/prev data per product
  const pdata=ps.map(p=>{
    const cur=view==='week'?gwd(p,wk):gma(p,month);
    const prev=view==='week'?gpwd(p,wk):gpma(p,month);
    const ma=gma(p,month);
    const chg=cur?.totalOrders&&prev?.totalOrders?(cur.totalOrders-prev.totalOrders)/prev.totalOrders:null;
    const ac=chg==null?'prod-no':chg<=-0.15?'prod-al':chg<=-0.05?'prod-wn':chg>=0.15?'prod-gd':'prod-no';
    return{p,cur,prev,ma,ac,hint:migrateHint(p,wk)};
  });

  // Build table HTML
  let html=`<div class="product-table-wrap"><table class="product-table">`;

  // ── Header row: field label col + one col per product ──
  html+=`<colgroup><col class="col-label">${ps.map(()=>`<col class="col-prod">`).join('')}</colgroup>`;
  html+=`<thead><tr>`;
  html+=`<td class="prod-hdr-cell sticky-corner" style="font-size:10px;color:var(--tx3);font-weight:500;vertical-align:bottom;padding-bottom:8px">${view==='week'?wk:month}</td>`;
  pdata.forEach(({p,ma,ac})=>{
    const cumOrd=ma?.totalOrders;const tgt=p.monthTarget;
    let progHtml='';
    if(tgt&&cumOrd!=null){
      const r=cumOrd/tgt;const w=Math.min(r/1.5*100,100);
      const cls=r>=1?'c-ok':r>=0.6?'c-mid':'c-lo';
      const pc=r>=1?'ok':r<0.5?'lo':'';
      progHtml=`<div class="prod-prog">
        <div class="prod-prog-row"><span style="white-space:nowrap">${fN(cumOrd)}/${fN(tgt)}</span><span class="prod-prog-pct ${pc}">${Math.round(r*100)}%</span></div>
        <div class="prod-prog-bg"><div class="prod-prog-fill ${cls}" style="width:${w}%"></div></div>
      </div>`;
    }
    html+=`<td class="prod-hdr-cell ${ac}" onclick="openEdit(${p.id})" style="cursor:pointer">
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="prod-name">${p.name}</span>
        <span class="prod-edit-btn">编辑</span>
      </div>
      <div class="prod-spu">${p.spu}</div>
      ${progHtml}
    </td>`;
  });
  html+=`</tr></thead>`;

  // ── Data rows ──
  html+=`<tbody>`;
  let lastSec=null;
  fields.forEach(f=>{
    // Section header row
    if(f.sec&&f.sec!==lastSec){
      lastSec=f.sec;
      html+=`<tr class="section-row"><td class="sec-label">${f.sec}</td>${ps.map(()=>`<td></td>`).join('')}</tr>`;
    }
    // Data row
    html+=`<tr class="data-row">`;
    // label cell
    const autoMark=f.auto?'<span style="font-size:9px;color:var(--tx3);margin-left:2px">⟳</span>':'';
    html+=`<td class="field-label">${f.l}${autoMark}</td>`;
    // value cells
    pdata.forEach(({cur,prev})=>{
      const v=cur?.[f.k];
      let valStr;
      if(f.type==='text'){valStr=v||'<span class="ev">—</span>';}
      else valStr=fmt(v,f.type)||'<span class="ev">—</span>';

      // comparison inline
      let cmpStr='';
      if(f.cmp&&showCmp&&prev!=null&&v!=null&&prev[f.k]!=null){
        const pv=prev[f.k];
        const diff=(v-pv)/Math.abs(pv||1);
        const pct=Math.abs(Math.round(diff*100));
        const arrow=diff>0.02?'↑':diff<-0.02?'↓':'→';
        const cls=diff>0.02?'cu':diff<-0.02?'cd':'cf';
        const prevStr=fmt(pv,f.type)||'—';
        cmpStr=`<span class="${cls}">${arrow}${pct}%</span> <span style="color:var(--tx3)">vs ${prevStr}</span>`;
      }

      // alert coloring for key metrics
      let valCls='field-val';
      if(v!=null&&prev?.[f.k]!=null&&(f.k==='totalOrders'||f.k==='tkOrders')){
        const chg=(v-prev[f.k])/Math.abs(prev[f.k]);
        if(chg<=-0.15)valCls+=' al';else if(chg>=0.15)valCls+=' gd';
      }

      html+=`<td class="${valCls}">${valStr}</td>`;
      if(showCmp)html+=`<td class="cmp-cell">${cmpStr}</td>`;
    });
    html+=`</tr>`;
  });

  // Hint row (migration alerts)
  const hints=pdata.map(({hint})=>hint);
  if(hints.some(Boolean)){
    html+=`<tr class="hint-row"><td class="hl">⚡ 周期提示</td>`;
    pdata.forEach(({hint})=>{
      html+=`<td${showCmp?` colspan="2"`:''} style="font-size:10px">${hint||''}</td>`;
    });
    html+=`</tr>`;
  }

  html+=`</tbody></table></div>`;
  return html;
}

function hf(type,files){
  if(!files||!files.length)return;
  const file=files[0];const pEl=document.getElementById(`ps-${type}`);const dzEl=document.getElementById(`dz-${type}`);
  pEl.textContent=`解析 ${file.name}…`;pEl.className='pstat';

  reader.onload=e=>{
    try{
      let rows;
      if(file.name.toLowerCase().endsWith('.csv')){rows=csvRows(e.target.result);}
      else{const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});}
      if(!rows||rows.length<2)throw new Error('文件为空');
      let parsed={};
      if(type==='tk')parsed=parseTK(rows);else if(type==='sp')parsed=parseSP(rows);else if(type==='kol')parsed=parseKOL(rows);else parsed=parseCost(rows);
      const cnt=Object.keys(parsed).filter(k=>k!=='detectedWk').length;ups[type]=parsed;
      const wkHint=parsed.detectedWk?' · 自动写入'+parsed.detectedWk:'';
      const matchCnt=type==='cost'?cnt:Object.keys(parsed).filter(k=>k!=='detectedWk'&&products.find(p=>p.spu===k)).length;
      const skipCnt=cnt-matchCnt;
      const skipNote=skipCnt>0&&type!=='cost'?' ('+skipCnt+'个未匹配忽略)':'';
      pEl.textContent='✓ 匹配 '+matchCnt+(type==='cost'?'个SPU成本':' 个产品')+skipNote+wkHint;pEl.className='pstat ok';dzEl.classList.add('done');
      renderUpvPreview();document.getElementById('cbtn').style.display='';
    }catch(err){pEl.textContent=`失败：${err.message}`;pEl.className='pstat er';}
  };
  if(file.name.toLowerCase().endsWith('.csv'))reader.readAsText(file);else reader.readAsBinaryString(file);
}
function csvRows(text){return text.split('\n').filter(l=>l.trim()).map(l=>{const res=[];let cur='',inQ=false;for(const c of l){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}res.push(cur);return res;})}
function renderUpvPreview(){

    if(!ups[t])return;

      else if(d.tkId&&tkIdToSpuPv[d.tkId])resolvedKey=tkIdToSpuPv[d.tkId];
      if(!merged[resolvedKey])merged[resolvedKey]={spu:resolvedKey};

  const allSpus=Object.keys(merged);

  }).join('');
  const skipNote=skipped>0?`<span style="color:var(--tx3);font-weight:400;margin-left:8px">忽略 ${skipped} 个未知SPU</span>`:'';
  document.getElementById('upv').innerHTML=`

;

function confirmUpload(){
  const importBatchId='import_'+Date.now();
  const importedSpus=[];
  const detectedWks=[ups.tk&&ups.tk.detectedWk,ups.sp&&ups.sp.detectedWk,ups.kol&&ups.kol.detectedWk].filter(Boolean);
  const wk=detectedWks[0]||wkLabel(wkOff);

  const tkIdToSpu={};
  products.forEach(function(p){

    });
  });

  const merged={};
  ['tk','sp','kol'].forEach(function(t){
    if(!ups[t])return;

      if(k==='detectedWk')return;
      // k is either SPU (from SP- extraction) or TK ID (fallback)
      // Try to resolve TK ID to SPU via tkIdToSpu map
      var resolvedKey=k;
      if(tkIdToSpu[k])resolvedKey=tkIdToSpu[k];
      else if(d.tkId&&tkIdToSpu[d.tkId])resolvedKey=tkIdToSpu[d.tkId];
      if(!merged[resolvedKey])merged[resolvedKey]={spu:resolvedKey};
      // Merge data, accumulating numerics
      var existing=merged[resolvedKey];
      ['tkOrders','tkGmv','tkImp','liveImp','vidImp','kolOrders','kolGmv','kolVideos','kolCreators',
       'spOrders','spGmv'].forEach(function(f){
        if(d[f]!=null&&d[f]!==0)existing[f]=(existing[f]||0)+d[f];
      });
      ['tkCtr','tkCvr','spCtr','spCvr','spImp','liveCtr','liveCvr','liveStay',
       'vidCtr','vidCvr','repurchase','name'].forEach(function(f){
        if(d[f]!=null)existing[f]=d[f];
      });
    });
  });
  const numFlds=['tkOrders','tkGmv','spOrders','spGmv','tkImp','liveImp','liveOrders','liveGmv','vidImp','vidOrders','vidGmv','pcImp','kolOrders','kolGmv','kolVideos','kolCreators'];
  const rateFlds=['tkCtr','tkCvr','spCtr','spCvr','spImp','liveCtr','liveCvr','liveStay','vidCtr','vidCvr','pcCtr','pcCvr','repurchase'];
  Object.entries(merged).forEach(function(me){
    var spu=me[0],d=me[1];
    const ex=products.find(function(p){return p.spu===spu;});
    // Use existing product stage — don't override from UI
    const stageKeep=ex?ex.stage:'test';
    const entry={week:wk};
    numFlds.forEach(function(k){if(d[k]!=null&&d[k]!==0)entry[k]=d[k];});
    rateFlds.forEach(function(k){if(d[k]!=null)entry[k]=d[k];});
    applyAuto(entry);
    if(ex){
      // Keep existing stage (don't overwrite)
      importedSpus.push(spu);
      ex._lastImport=importBatchId;
      const exWk=ex.weeks.find(function(w){return w.week===wk;});
      if(exWk){
        numFlds.forEach(function(k){if(entry[k]!=null)exWk[k]=(exWk[k]||0)+entry[k];});
        rateFlds.forEach(function(k){if(entry[k]!=null)exWk[k]=entry[k];});
        applyAuto(exWk);
      } else {
        ex.weeks.push(entry);
      }
    }
    // Unknown SPU — silently skip, only update existing products
  });
  // Apply cost data to calculate gross margin
  if(ups.cost){
    Object.entries(ups.cost).forEach(function(ce){
      var spu=ce[0],costData=ce[1];
      var p=products.find(function(pr){return pr.spu===spu;});
      if(!p||!costData.avgCost)return;
      p.avgCost=costData.avgCost;
      // Calculate gross margin for matched week entry
      var exWk=p.weeks.find(function(w){return w.week===wk;});
      if(exWk&&exWk.totalGmv&&exWk.totalOrders){
        var totalCost=costData.avgCost*exWk.totalOrders;
        exWk.grossMargin=Math.max(0,1-(totalCost/exWk.totalGmv));
      }
    });
  }
  closeModal();renderAll();scheduleSave();
  if(importedSpus.length>0){
    setTimeout(function(){
      alert('✓ 成功匹配并更新 '+importedSpus.length+' 个产品\nSPU: '+importedSpus.join(', '));
    },500);
  } else {
    setTimeout(function(){
      alert('⚠ 未匹配到任何已有产品\n请确认看板里已录入对应SPU的产品');
    },500);
  }
}

async function loadCloud(){
  if(!CONFIG.JSONBIN_KEY||CONFIG.JSONBIN_KEY.startsWith('在这里')){setSyncStatus('err','⚠ 请填写 JSONBin Key');return;}
  setSyncStatus('saving','加载中…');
  try{
    if(!binId){await createBin();return;}
    const res=await fetch(`${JSONBIN_URL}/${binId}/latest`,{headers:{'X-Master-Key':CONFIG.JSONBIN_KEY,'X-Bin-Meta':'false'}});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(data.products)products=data.products.map(p=>({...p,weeks:(p.weeks||[]).map(w=>applyAuto({...w}))}));
    setSyncStatus('ok','已同步');setSyncTime();renderAll();
  }catch(e){setSyncStatus('err','加载失败: '+e.message);}
